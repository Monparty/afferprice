# รันตัวแอป Next.js ใน Docker สำหรับ "เพื่อนรันเองบนเครื่อง"
# Backend (Supabase) มาจาก `npx supabase start` แยกต่างหาก แล้วต่อกันผ่าน host.docker.internal
# ค่าที่เป็นความลับ (service_role, Omise secret) อ่านจากไฟล์ .env (gitignored) — ดู .env.example
# ค่าอื่นเป็น local/test ที่ไม่ลับ (Supabase demo keys, NEXT_PUBLIC_*) จึงฝังตรงนี้ได้
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* ถูก inline ตอน build (browser ใช้ 127.0.0.1 = พอร์ต Supabase บน host)
        NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
        NEXT_PUBLIC_OMISE_PUBLIC_KEY: pkey_test_67ik3r6ok5s91fa8sw8
    ports:
      - "3000:3000"
    extra_hosts:
      # ให้ server-code ในคอนเทนเนอร์ยิงถึง Supabase local ที่รันบน host ได้
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      # server ในคอนเทนเนอร์ต้องใช้ host.docker.internal (127.0.0.1 = ตัวคอนเทนเนอร์เอง)
      SUPABASE_INTERNAL_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      NEXT_PUBLIC_OMISE_PUBLIC_KEY: pkey_test_67ik3r6ok5s91fa8sw8
      # ↓ secrets — อ่านจากไฟล์ .env (gitignored; เจ้าของส่งให้เพื่อนแยก / ดู .env.example)
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OMISE_SECRET_KEY: ${OMISE_SECRET_KEY}
